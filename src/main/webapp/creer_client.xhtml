<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets"
                template="/WEB-INF/template.xhtml">
    
    <ui:define name="title">Créer un Client</ui:define>
    
    <ui:define name="pageIcon">
        <i class="pi pi-user-plus"></i>
    </ui:define>
    
    <ui:define name="pageTitle">
        Créer un Nouveau Client
    </ui:define>
    
    <ui:define name="content">
        <style>
            .ui-panel {
                border-radius: 12px !important;
                border: none !important;
                box-shadow: 0 4px 16px rgba(0, 71, 255, 0.1) !important;
                margin-bottom: 30px;
                background: white !important;
            }
            
            .ui-panel .ui-panel-titlebar {
                background: linear-gradient(135deg, #0047FF 0%, #0039CC 100%) !important;
                border: none !important;
                border-radius: 12px 12px 0 0 !important;
                padding: 20px 25px !important;
                color: white !important;
                font-size: 18px !important;
                font-weight: 600 !important;
            }
            
            .ui-panel .ui-panel-content {
                padding: 30px !important;
                background: white !important;
                border-radius: 0 0 12px 12px !important;
            }
            
            .form-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                gap: 20px;
                margin-bottom: 25px;
            }
            
            .form-field {
                display: flex;
                flex-direction: column;
            }
            
            .form-field label {
                font-weight: 600;
                color: #2c3e50;
                margin-bottom: 8px;
                font-size: 14px;
            }
            
            .ui-inputtext, .ui-password input {
                border: 2px solid #e1e8ed !important;
                border-radius: 8px !important;
                padding: 12px 16px !important;
                font-size: 15px !important;
                transition: all 0.3s ease !important;
                width: 100% !important;
            }
            
            .ui-inputtext:focus, .ui-password input:focus {
                border-color: #0047FF !important;
                box-shadow: 0 0 0 3px rgba(0, 71, 255, 0.1) !important;
                outline: none !important;
            }
            
            .btn-weezevent {
                background: linear-gradient(135deg, #0047FF 0%, #0039CC 100%) !important;
                border: none !important;
                border-radius: 8px !important;
                padding: 14px 32px !important;
                font-size: 16px !important;
                font-weight: 600 !important;
                color: white !important;
                cursor: pointer !important;
                transition: all 0.3s ease !important;
                box-shadow: 0 4px 12px rgba(0, 71, 255, 0.3) !important;
            }
            
            .btn-weezevent:hover {
                transform: translateY(-2px) !important;
                box-shadow: 0 6px 20px rgba(0, 71, 255, 0.4) !important;
            }
            
            .ui-datatable {
                border-radius: 12px !important;
                overflow: hidden !important;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05) !important;
            }
            
            .ui-datatable .ui-datatable-thead > tr > th {
                background: #f8f9fa !important;
                color: #2c3e50 !important;
                font-weight: 600 !important;
                padding: 16px !important;
                border: none !important;
                border-bottom: 2px solid #0047FF !important;
                font-size: 14px !important;
                text-transform: uppercase !important;
                letter-spacing: 0.5px !important;
            }
            
            .ui-datatable .ui-datatable-data > tr > td {
                padding: 16px !important;
                border: none !important;
                border-bottom: 1px solid #f1f3f5 !important;
                font-size: 15px !important;
                color: #495057 !important;
            }
            
            .ui-datatable .ui-datatable-data > tr:hover {
                background: #f8f9ff !important;
            }
            
            .button-container {
                display: flex;
                justify-content: flex-end;
                margin-top: 20px;
            }
        </style>
        
        <!-- Panel Formulaire d'ajout de client -->
        <p:panel header="Informations du Client">
            <h:form id="clientForm">
                <div class="form-grid">
                    <div class="form-field">
                        <p:outputLabel value="Nom *" />
                        <p:inputText 
                            value="#{clientController.nouveauClient.nom}" 
                            required="true"
                            requiredMessage="Le nom est obligatoire"
                            placeholder="Entrez le nom"/>
                    </div>
                    
                    <div class="form-field">
                        <p:outputLabel value="Prénom *" />
                        <p:inputText 
                            value="#{clientController.nouveauClient.prenom}" 
                            required="true"
                            requiredMessage="Le prénom est obligatoire"
                            placeholder="Entrez le prénom"/>
                    </div>
                    
                    <div class="form-field">
                        <p:outputLabel value="Email *" />
                        <p:inputText 
                            value="#{clientController.nouveauClient.email}" 
                            required="true"
                            requiredMessage="L'email est obligatoire"
                            validatorMessage="Format d'email invalide"
                            placeholder="exemple@email.com">
                            <f:validateRegex pattern="^[A-Za-z0-9+_.-]+@(.+)$" />
                        </p:inputText>
                    </div>
                    
                    <div class="form-field">
                        <p:outputLabel value="Mot de passe *" />
                        <p:password 
                            value="#{clientController.nouveauClient.motDePasse}" 
                            required="true"
                            requiredMessage="Le mot de passe est obligatoire"
                            feedback="true"
                            weakLabel="Faible"
                            goodLabel="Moyen"
                            strongLabel="Fort"
                            placeholder="Minimum 8 caractères">
                            <f:validateLength minimum="8" />
                        </p:password>
                    </div>
                </div>
                
                <div class="button-container">
                    <p:commandButton 
                        value="Créer le Client" 
                        action="#{clientController.creerClient()}" 
                        update="clientForm clientsTable messages"
                        icon="pi pi-check"
                        styleClass="btn-weezevent"/>
                </div>
            </h:form>
        </p:panel>
        
        <!-- Panel Liste des clients -->
        <p:panel header="Liste des Clients Créés">
            <p:dataTable 
                id="clientsTable"
                value="#{clientController.clients}" 
                var="client"
                emptyMessage="Aucun client enregistré"
                paginator="true"
                rows="10"
                paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                rowsPerPageTemplate="5,10,15"
                currentPageReportTemplate="Affichage de {startRecord} à {endRecord} sur {totalRecords} clients">
                
                <p:column headerText="ID" style="width: 80px; text-align: center;">
                    <h:outputText value="#{client.id}" />
                </p:column>
                
                <p:column headerText="Nom" sortBy="#{client.nom}" filterBy="#{client.nom}" filterMatchMode="contains">
                    <h:outputText value="#{client.nom}" />
                </p:column>
                
                <p:column headerText="Prénom" sortBy="#{client.prenom}" filterBy="#{client.prenom}" filterMatchMode="contains">
                    <h:outputText value="#{client.prenom}" />
                </p:column>
                
                <p:column headerText="Email" sortBy="#{client.email}" filterBy="#{client.email}" filterMatchMode="contains">
                    <h:outputText value="#{client.email}" />
                </p:column>
                
                <p:column headerText="Rôle" style="width: 150px; text-align: center;">
                    <h:outputText value="#{client.role}" style="background: #e8f5e9; padding: 6px 12px; border-radius: 6px; color: #2e7d32; font-weight: 600;"/>
                </p:column>
            </p:dataTable>
        </p:panel>
    </ui:define>
</ui:composition>
