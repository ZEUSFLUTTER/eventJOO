<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets"
                template="/WEB-INF/public_template.xhtml">
    
    <ui:define name="title">Connexion - EventPlatform</ui:define>
    
    <ui:define name="content">
        <div class="container" style="max-width: 500px; margin: 4rem auto; padding: 2rem;">
            <div class="card" style="border: none; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.1);">
                <div class="card-body" style="padding: 3rem;">
                    <div style="text-align: center; margin-bottom: 2rem;">
                        <i class="pi pi-sign-in" style="font-size: 48px; color: var(--eventplatform-blue); margin-bottom: 1rem;"></i>
                        <h2 style="color: var(--eventplatform-text); font-weight: 700; margin-bottom: 0.5rem;">Connexion</h2>
                        <p style="color: var(--eventplatform-text-muted);">Accédez à votre espace EventPlatform</p>
                    </div>

                    <h:form id="loginForm">
                        <p:growl id="messages" showDetail="true" />

                        <div style="margin-bottom: 1.5rem;">
                            <label style="display: block; font-weight: 600; color: var(--eventplatform-text); margin-bottom: 0.5rem;">Email</label>
                            <p:inputText 
                                value="#{authController.email}" 
                                placeholder="votre@email.com"
                                style="width: 100%; padding: 12px 16px; border: 1px solid var(--eventplatform-border); border-radius: 8px; font-size: 16px;"/>
                        </div>
                        
                        <div style="margin-bottom: 2rem;">
                            <label style="display: block; font-weight: 600; color: var(--eventplatform-text); margin-bottom: 0.5rem;">Mot de passe</label>
                            <p:password 
                                value="#{authController.motDePasse}" 
                                placeholder="Votre mot de passe"
                                feedback="false"
                                style="width: 100%; padding: 12px 16px; border: 1px solid var(--eventplatform-border); border-radius: 8px; font-size: 16px;"/>
                        </div>
                        
                        <p:commandButton 
                            value="Se Connecter" 
                            action="#{authController.seConnecter()}" 
                            update="messages" 
                            style="width: 100%; background: var(--eventplatform-blue); border: none; color: white; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: 600; margin-bottom: 1rem;"/>
                        
                        <div style="text-align: center;">
                            <p style="color: var(--eventplatform-text-muted); margin: 0;">
                                Pas encore de compte ? 
                                <h:link outcome="index" style="color: var(--eventplatform-blue); text-decoration: none; font-weight: 600;">
                                    Découvrir EventPlatform
                                </h:link>
                            </p>
                        </div>
                    </h:form>
                </div>
            </div>
        </div>
    </ui:define>
</ui:composition>
