<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="jakarta.faces.facelets"
                template="/WEB-INF/template.xhtml">

    <ui:define name="title">Créer un Événement</ui:define>

    <ui:define name="pageIcon">
        <i class="pi pi-sparkles text-warning" style="font-size: 1.5rem;"></i>
    </ui:define>

    <ui:define name="pageTitle">Nouvel Événement</ui:define>

    <ui:define name="content">
        <style>
            /* Premium Event Creation Styles */
            .creation-card {
                background: white;
                border-radius: 24px;
                padding: 40px;
                margin-bottom: 30px;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
                border: 1px solid #f1f5f9;
            }
            
            .section-header {
                display: flex;
                align-items: center;
                gap: 15px;
                margin-bottom: 25px;
            }
            
            .section-icon {
                width: 48px;
                height: 48px;
                border-radius: 14px;
                background: #f8fafc;
                color: #3b82f6;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 20px;
            }
            
            .section-title {
                font-size: 22px;
                font-weight: 800;
                color: #0f172a;
                margin: 0;
                letter-spacing: -0.5px;
            }
            
            .form-label {
                display: block;
                font-weight: 700;
                color: #0f172a;
                margin-bottom: 10px;
                font-size: 14px;
            }
            
            .ui-inputfield {
                width: 100% !important;
                padding: 14px 18px !important;
                background: #f8fafc !important;
                border: 2px solid transparent !important;
                border-radius: 14px !important;
                font-size: 15px !important;
                font-weight: 500 !important;
                transition: all 0.3s ease !important;
            }
            
            .ui-inputfield:focus {
                background: white !important;
                border-color: #3b82f6 !important;
                box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1) !important;
            }
            
            .btn-premium-launch {
                background: linear-gradient(135deg, #0047FF 0%, #0039CC 100%) !important;
                border: none !important;
                color: white !important;
                padding: 16px 40px !important;
                border-radius: 16px !important;
                font-weight: 800 !important;
                font-size: 16px !important;
                letter-spacing: 0.5px !important;
                box-shadow: 0 10px 25px rgba(0, 71, 255, 0.2) !important;
                transition: all 0.3s ease !important;
            }
            
            .btn-premium-launch:hover {
                transform: translateY(-3px);
                box-shadow: 0 15px 35px rgba(0, 71, 255, 0.3) !important;
            }
            
            .category-builder {
                background: #f8fafc;
                border-radius: 20px;
                padding: 30px;
                border: 1px dashed #cbd5e1;
            }
        </style>

        <h:form id="formCreerEvenement">
            <p:growl id="messages" showDetail="true" />

            <div class="row">
                <!-- Main Info Column -->
                <div class="col-lg-7">
                    <div class="creation-card">
                        <div class="section-header">
                            <div class="section-icon">
                                <i class="pi pi-file-edit"></i>
                            </div>
                            <h3 class="section-title">Détails de l'Événement</h3>
                        </div>
                        
                        <div class="ui-fluid">
                            <div class="form-group mb-4">
                                <h:outputLabel for="titre" value="Nom de l'événement" styleClass="form-label"/>
                                <p:inputText id="titre" value="#{orgaEvenementController.nouvelEvenement.titre}" required="true" placeholder="Ex: Festival des Lumières 2026"/>
                            </div>
                            
                            <div class="form-group mb-4">
                                <h:outputLabel for="description" value="Description" styleClass="form-label"/>
                                <p:inputTextarea id="description" value="#{orgaEvenementController.nouvelEvenement.description}" rows="6" placeholder="Décrivez l'expérience unique que vous proposez..."/>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <div class="form-group">
                                        <h:outputLabel for="lieu" value="Lieu / Adresse" styleClass="form-label"/>
                                        <p:inputText id="lieu" value="#{orgaEvenementController.nouvelEvenement.lieu}" required="true" placeholder="Ville, Salle ou Adresse"/>
                                    </div>
                                </div>
                                <div class="col-md-6 mb-4">
                                    <div class="form-group">
                                        <h:outputLabel for="dateEvent" value="Date et Heure" styleClass="form-label"/>
                                        <p:datePicker id="dateEvent" value="#{orgaEvenementController.nouvelEvenement.dateEvenement}" showTime="true" required="true"/>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                </div>
            </div>
            <div class="d-flex justify-content-center gap-3 mt-5">
                <p:commandButton value="Lancer l'Événement" action="#{orgaEvenementController.sauvegarderEvenement}" 
                                 styleClass="btn-premium-launch" icon="pi pi-rocket" update="messages formCreerEvenement" />
                <p:button outcome="orga_evenements" value="Annuler" styleClass="ui-button-flat ui-button-secondary" />
            </div>
        </h:form>
    </ui:define>
</ui:composition>
