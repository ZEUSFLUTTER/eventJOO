<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="jakarta.faces.facelets"
                template="/WEB-INF/template.xhtml">

    <ui:define name="title">Mes Événements</ui:define>

    <ui:define name="pageIcon">
        <i class="pi pi-compass text-primary" style="font-size: 1.5rem;"></i>
    </ui:define>

    <ui:define name="pageTitle">Tous mes événements</ui:define>

    <ui:define name="content">
        <style>
            /* Premium Events Management Styles */
            .event-page-header {
                background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
                padding: 50px 40px;
                border-radius: 24px;
                color: white;
                margin-bottom: 40px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                box-shadow: 0 20px 40px rgba(0,0,0,0.1);
                position: relative;
                overflow: hidden;
            }
            
            .event-page-header::after {
                content: '';
                position: absolute;
                top: -50%;
                right: -10%;
                width: 300px;
                height: 300px;
                background: radial-gradient(circle, rgba(0, 71, 255, 0.2) 0%, transparent 70%);
                border-radius: 50%;
            }
            
            .event-page-title h2 {
                font-size: 32px;
                font-weight: 800;
                letter-spacing: -1px;
                margin: 0 0 10px 0;
                position: relative;
                z-index: 2;
            }
            
            .event-page-title p {
                font-size: 16px;
                color: #94a3b8;
                margin: 0;
                position: relative;
                z-index: 2;
            }
            
            .btn-create-premium {
                background: white !important;
                color: #0f172a !important;
                border: none !important;
                padding: 14px 28px !important;
                border-radius: 14px !important;
                font-weight: 700 !important;
                font-size: 15px !important;
                transition: all 0.3s ease !important;
                position: relative;
                z-index: 2;
            }
            
            .btn-create-premium:hover {
                transform: translateY(-3px);
                box-shadow: 0 10px 25px rgba(255,255,255,0.2) !important;
            }
            
            .data-card {
                background: white;
                border-radius: 24px;
                padding: 30px;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
                border: 1px solid #f1f5f9;
            }
            
            .premium-table .ui-datatable-thead > tr > th {
                background: #f8fafc !important;
                color: #64748b !important;
                font-weight: 700 !important;
                font-size: 12px !important;
                text-transform: uppercase !important;
                letter-spacing: 1px !important;
                padding: 20px 25px !important;
                border: none !important;
            }
            
            .premium-table .ui-datatable-data > tr > td {
                padding: 25px !important;
                border: none !important;
                border-bottom: 1px solid #f1f5f9 !important;
                font-size: 15px !important;
                vertical-align: middle !important;
            }
            
            .event-main-title {
                font-weight: 700;
                color: #0f172a;
                font-size: 16px;
                margin-bottom: 4px;
            }
            
            .event-location {
                font-size: 13px;
                color: #64748b;
                display: flex;
                align-items: center;
                gap: 6px;
            }
            
            .status-badge {
                padding: 6px 14px !important;
                border-radius: 10px !important;
                font-size: 12px !important;
                font-weight: 700 !important;
            }
            
            .status-published { background: #f0fdf4 !important; color: #16a34a !important; }
            .status-draft { background: #fee2e2 !important; color: #ef4444 !important; }
        </style>

        <h:form id="formEvenements">
            <p:growl id="messages" showDetail="true" />
            
            <div class="row">
                <div class="col-12">
                    <!-- Premium Header -->
                    <div class="event-page-header">
                        <div class="event-page-title">
                            <h2>Gérez vos Événements</h2>
                            <p>Consultez la liste complète de vos événements et suivez leur succès.</p>
                        </div>
                        <p:button outcome="orga_creer_evenement" value="Nouvel Événement" icon="pi pi-plus" styleClass="btn-create-premium" />
                    </div>

                    <!-- Premium Data Card -->
                    <div class="data-card">
                        <p:dataTable id="dt-evenements" widgetVar="dtEvenements" var="evenement" value="#{orgaEvenementController.mesEvenements}"
                                     reflow="true" styleClass="premium-table"
                                     paginator="true" rows="10" paginatorPosition="bottom"
                                     emptyMessage="Aucun événement trouvé.">

                            <p:column headerText="Événement" style="width: 35%;">
                                <div class="event-main-title">#{evenement.titre}</div>
                                <div class="event-location">
                                    <i class="pi pi-map-marker"></i> #{evenement.lieu}
                                </div>
                            </p:column>
                            
                            <p:column headerText="Date" style="width: 20%;">
                                <div style="font-weight: 700; color: #0f172a; display: flex; align-items: center; gap: 8px;">
                                    <i class="pi pi-calendar" style="color: #3b82f6;"></i>
                                    <h:outputText value="#{evenement.dateEvenement}">
                                        <f:convertDateTime pattern="dd MMM yyyy" locale="fr"/>
                                    </h:outputText>
                                </div>
                                <div style="font-size: 13px; color: #64748b; margin-top: 4px; padding-left: 22px;">
                                    <h:outputText value="#{evenement.dateEvenement}">
                                        <f:convertDateTime pattern="HH:mm" />
                                    </h:outputText>
                                </div>
                            </p:column>

                            <p:column headerText="Billetterie" style="width: 20%;">
                                <span style="font-weight: 700; color: #3b82f6;">#{evenement.categoriesBillets.size()}</span> catégories
                                <div style="font-size: 12px; color: #94a3b8; font-weight: 500; margin-top: 4px;">
                                    #{orgaEvenementController.resumeBilletterie(evenement)}
                                </div>
                            </p:column>

                            <p:column headerText="Statut" style="width: 15%; text-align: center;">
                                <p:tag 
                                    value="#{evenement.statut == 'Publié' ? 'EN LIGNE' : evenement.statut}" 
                                    styleClass="status-badge #{evenement.statut == 'Publié' ? 'status-published' : 'status-draft'}"/>
                            </p:column>

                            <p:column headerText="Actions" style="width: 10%; text-align: center;">
                                <div class="d-flex justify-content-center gap-2">
                                    <p:commandButton icon="pi pi-pencil" 
                                                     styleClass="ui-button-flat rounded-circle" 
                                                     title="Modifier"
                                                     process="@this"
                                                     update=":formEvenements:editEventDialogContent"
                                                     oncomplete="PF('editEventDialog').show()"
                                                     action="#{orgaEvenementController.preparerModification(evenement)}"/>
                                    <p:commandButton icon="pi pi-trash" 
                                                     styleClass="ui-button-flat ui-button-danger rounded-circle" 
                                                     title="Supprimer"
                                                     process="@this"
                                                     update="dt-evenements messages"
                                                     action="#{orgaEvenementController.supprimerEvenement(evenement)}">
                                        <p:confirm header="Confirmation" message="Supprimer cet événement ?" icon="pi pi-exclamation-triangle"/>
                                    </p:commandButton>
                                </div>
                            </p:column>

                        </p:dataTable>
                    </div>
                </div>
            </div>



            <p:dialog id="editEventDialog" widgetVar="editEventDialog" modal="true" responsive="true" header="Modifier l'événement" width="650">
                <h:panelGroup id="editEventDialogContent" layout="block">
                    <div class="ui-fluid">
                        <div class="form-group mb-3">
                            <h:outputLabel for="editTitre" value="Nom de l'événement" styleClass="form-label"/>
                            <p:inputText id="editTitre" value="#{orgaEvenementController.evenementEnEdition.titre}" required="true"/>
                        </div>
                        <div class="form-group mb-3">
                            <h:outputLabel for="editDescription" value="Description" styleClass="form-label"/>
                            <p:inputTextarea id="editDescription" value="#{orgaEvenementController.evenementEnEdition.description}" rows="5"/>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <h:outputLabel for="editLieu" value="Lieu" styleClass="form-label"/>
                                <p:inputText id="editLieu" value="#{orgaEvenementController.evenementEnEdition.lieu}" required="true"/>
                            </div>
                            <div class="col-md-6 mb-3">
                                <h:outputLabel for="editDate" value="Date et heure" styleClass="form-label"/>
                                <p:datePicker id="editDate" value="#{orgaEvenementController.evenementEnEdition.dateEvenement}" showTime="true" required="true"/>
                            </div>
                        </div>
                        <div class="form-group mb-3">
                            <h:outputLabel for="editStatut" value="Statut" styleClass="form-label"/>
                            <p:selectOneMenu id="editStatut" value="#{orgaEvenementController.evenementEnEdition.statut}">
                                <f:selectItem itemValue="Publié" itemLabel="Publié" />
                                <f:selectItem itemValue="Brouillon" itemLabel="Brouillon" />
                                <f:selectItem itemValue="Annulé" itemLabel="Annulé" />
                            </p:selectOneMenu>
                        </div>
                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <p:commandButton value="Enregistrer" icon="pi pi-check"
                                             action="#{orgaEvenementController.sauvegarderModification()}"
                                             update="dt-evenements messages"
                                             oncomplete="PF('editEventDialog').hide()"/>
                            <p:commandButton value="Annuler" type="button" icon="pi pi-times"
                                             styleClass="ui-button-secondary"
                                             onclick="PF('editEventDialog').hide()"/>
                        </div>
                    </div>
                </h:panelGroup>
            </p:dialog>
        </h:form>

        <h:form id="confirmForm">
            <p:confirmDialog global="true" showEffect="fade" hideEffect="fade" responsive="true" width="350">
                <p:commandButton value="Non" type="button" styleClass="ui-confirmdialog-no ui-button-flat ui-button-secondary" icon="pi pi-times"/>
                <p:commandButton value="Oui" type="button" styleClass="ui-confirmdialog-yes ui-button-danger" icon="pi pi-check"/>
            </p:confirmDialog>
        </h:form>
    </ui:define>
</ui:composition>
